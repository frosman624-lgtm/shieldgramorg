<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GAWR GURA — Panel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.7.0/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');
:root{
  --bg:#020608;--bg2:#060d10;--bg3:#0b1519;--card:#0d1b22;
  --border:#0e2a35;--accent:#00ff88;--accent2:#00c8ff;--accent3:#ff4e8e;
  --text:#a8f0cc;--text2:#3a6b58;--green:#00ff88;--yellow:#ffdd00;
  --red:#ff3355;--matrix:#00ff41;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}

/* ── MATRIX CANVAS ── */
#matrix-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.18}

/* ── LOGIN ── */
#login-page{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,rgba(0,255,136,.04) 0%,transparent 65%),var(--bg);
}
.login-box{
  position:relative;z-index:1;
  background:rgba(6,13,16,.92);
  border:1px solid rgba(0,255,136,.18);
  border-radius:16px;padding:44px 40px;width:400px;
  box-shadow:0 0 60px rgba(0,255,136,.07),0 0 0 1px rgba(0,255,136,.06);
  backdrop-filter:blur(12px);
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.login-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 16px 16px;background:linear-gradient(90deg,transparent,var(--accent2),transparent)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo .icon-wrap{
  width:68px;height:68px;border-radius:50%;margin:0 auto 14px;
  background:radial-gradient(circle,rgba(0,255,136,.15),rgba(0,200,255,.06));
  border:1px solid rgba(0,255,136,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--accent);
  box-shadow:0 0 20px rgba(0,255,136,.15);
  animation:iconpulse 3s infinite;
}
@keyframes iconpulse{0%,100%{box-shadow:0 0 20px rgba(0,255,136,.15)}50%{box-shadow:0 0 35px rgba(0,255,136,.3)}}
.login-logo .brand{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(0,255,136,.5)}
.login-logo .sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:5px;margin-top:4px}
.tab-row{display:flex;gap:0;margin-bottom:26px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;background:transparent;border:none;color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(0,255,136,.1);color:var(--accent)}
.fg{margin-bottom:16px}
.fg label{display:block;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text2);margin-bottom:7px;text-transform:uppercase}
.fg .iw{position:relative}
.fg .iw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px;pointer-events:none}
.fg input,.fg select{
  width:100%;padding:11px 13px 11px 38px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:6px;color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fg input:focus,.fg select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.07)}
.fg select option{background:#0a1a22}
.btn-login{
  width:100%;padding:12px;margin-top:6px;
  background:transparent;border:1px solid var(--accent);
  border-radius:6px;color:var(--accent);
  font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.btn-login::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .25s}
.btn-login:hover{color:#000;text-shadow:none}
.btn-login:hover::before{opacity:1}
.btn-login span{position:relative;z-index:1}
.login-err{color:var(--red);font-family:'Share Tech Mono',monospace;font-size:11px;margin-top:12px;text-align:center;display:none}
.reg-link{text-align:center;margin-top:14px;font-size:11px;color:var(--text2);font-family:'Share Tech Mono',monospace}
.reg-link a{color:var(--accent2);cursor:pointer;text-decoration:none}
.reg-link a:hover{color:var(--accent)}

/* ── APP ── */
#app{display:none;min-height:100vh}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:220px;
  background:rgba(6,13,16,.97);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:50;
  backdrop-filter:blur(10px);
}
.sidebar::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--accent),transparent)}
.sb-brand{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sb-brand .brand{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 15px rgba(0,255,136,.4)}
.sb-brand .sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:4px;margin-top:3px}
.sb-nav{flex:1;padding:14px 8px;overflow-y:auto}
.nav-sec{margin-bottom:20px}
.nav-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--text2);padding:0 10px;margin-bottom:8px;opacity:.7}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:6px;
  color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-bottom:2px;
  font-family:'Share Tech Mono',monospace;letter-spacing:.5px;
  border:1px solid transparent;
}
.nav-item i{width:16px;text-align:center;font-size:13px}
.nav-item:hover{color:var(--text);background:rgba(0,255,136,.04);border-color:rgba(0,255,136,.08)}
.nav-item.active{color:var(--accent);background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.18)}
.nav-item.active i{text-shadow:0 0 10px var(--accent)}
.sb-footer{padding:14px;border-top:1px solid var(--border)}
.user-badge{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:8px;
  background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.1);
}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:rgba(0,255,136,.15);color:var(--accent);font-family:'Orbitron',monospace}
.ub-info .name{font-size:12px;font-weight:700;color:var(--text);font-family:'Share Tech Mono',monospace}
.ub-info .role{font-size:9px;color:var(--text2);letter-spacing:2px;font-family:'Share Tech Mono',monospace}
.btn-logout{margin-left:auto;background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;transition:color .2s}
.btn-logout:hover{color:var(--red)}

/* ── MAIN ── */
.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:rgba(6,13,16,.9);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
.page-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--text);letter-spacing:2px}
.page-title span{color:var(--accent);text-shadow:0 0 10px rgba(0,255,136,.3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(0,0,0,.4);border:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2)}
.dot-online{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:24px;flex:1;position:relative;z-index:1}
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;
  position:relative;overflow:hidden;transition:transform .2s,border-color .2s;cursor:default;
}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(0,255,136,.2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-c,var(--accent)),transparent)}
.stat-card .sc-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:12px}
.stat-card .sc-val{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--text);line-height:1}
.stat-card .sc-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:2px;margin-top:5px;text-transform:uppercase}
.c1{--accent-c:#00ff88}.c1 .sc-icon{background:rgba(0,255,136,.08);color:#00ff88}
.c2{--accent-c:#00c8ff}.c2 .sc-icon{background:rgba(0,200,255,.08);color:#00c8ff}
.c3{--accent-c:#ffdd00}.c3 .sc-icon{background:rgba(255,221,0,.08);color:#ffdd00}
.c4{--accent-c:#ff4e8e}.c4 .sc-icon{background:rgba(255,78,142,.08);color:#ff4e8e}

/* ── SECTION ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.sec-title i{color:var(--accent)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;background:rgba(0,255,136,.08);color:var(--accent);border:1px solid rgba(0,255,136,.15);margin-left:6px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:6px;border:1px solid transparent;
  font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:1px;
}
.btn-primary{background:rgba(0,255,136,.1);color:var(--accent);border-color:rgba(0,255,136,.25)}
.btn-primary:hover{background:rgba(0,255,136,.18);box-shadow:0 0 12px rgba(0,255,136,.15)}
.btn-danger{background:rgba(255,51,85,.08);color:var(--red);border-color:rgba(255,51,85,.2)}
.btn-danger:hover{background:rgba(255,51,85,.16)}
.btn-info{background:rgba(0,200,255,.08);color:var(--accent2);border-color:rgba(0,200,255,.2)}
.btn-info:hover{background:rgba(0,200,255,.15)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-success{background:rgba(0,255,136,.08);color:var(--green);border-color:rgba(0,255,136,.2)}
.btn-success:hover{background:rgba(0,255,136,.18)}
.btn-outline{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}

/* ── TABLE ── */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);padding:10px 14px;text-align:left;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase}
tbody tr{border-bottom:1px solid rgba(14,42,53,.6);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(0,255,136,.02)}
tbody td{padding:10px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-family:'Share Tech Mono',monospace;font-weight:700}
.sbadge-vip{background:rgba(0,200,255,.08);color:var(--accent2);border:1px solid rgba(0,200,255,.2)}
.sbadge-free{background:rgba(58,107,88,.1);color:var(--text2);border:1px solid var(--border)}
.sbadge-cred{background:rgba(255,221,0,.08);color:var(--yellow);border:1px solid rgba(255,221,0,.2)}
.sbadge-admin{background:rgba(255,78,142,.08);color:var(--accent3);border:1px solid rgba(255,78,142,.2)}
.sbadge-ok{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.15)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.sw i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:12px}
.sw input{width:100%;padding:8px 12px 8px 33px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--accent)}
.fsel{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;cursor:pointer}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid rgba(0,255,136,.15);border-radius:16px;padding:28px;width:480px;max-width:95vw;position:relative;transform:scale(.95) translateY(8px);transition:transform .25s ease;overflow:hidden;max-height:90vh;overflow-y:auto}
.modal-ov.open .modal{transform:scale(1) translateY(0)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.modal-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:8px;letter-spacing:2px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;transition:color .2s}
.modal-close:hover{color:var(--red)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── PDF PAGE ── */
.pdf-layout{display:grid;grid-template-columns:280px 1fr;gap:18px}
.pdf-cfg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;height:fit-content;position:sticky;top:76px}
.pdf-cfg-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:16px;letter-spacing:2px;display:flex;align-items:center;gap:7px}
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.color-opt{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2)}
.color-opt:hover,.color-opt.sel{border-color:var(--accent);color:var(--text);background:rgba(0,255,136,.05)}
.cswatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.pdf-area{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.pdf-ta{width:100%;height:200px;resize:vertical;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;padding:12px;outline:none;line-height:1.7;transition:border-color .2s}
.pdf-ta:focus{border-color:var(--accent)}
.pdf-ta::placeholder{color:var(--text2)}
.fmt-hint{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:12px}
.fmt-title{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--accent2);margin-bottom:8px;text-transform:uppercase}
.fmt-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:4px}
.fmt-item i{color:var(--accent);font-size:9px}
.parsed-blk{background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.parsed-hdr{padding:8px 12px;background:rgba(0,255,136,.05);border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.ptbl{width:100%;font-size:10px}
.ptbl th{padding:6px 9px;text-align:left;color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)}
.ptbl td{padding:6px 9px;border-bottom:1px solid rgba(14,42,53,.4);color:var(--text);font-family:'Share Tech Mono',monospace}

/* ── USER PANEL ── */
.user-panel-grid{display:grid;grid-template-columns:260px 1fr;gap:18px}
.user-profile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;height:fit-content}
.up-avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;background:rgba(0,255,136,.1);border:2px solid rgba(0,255,136,.25);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:var(--accent);box-shadow:0 0 20px rgba(0,255,136,.1)}
.up-name{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--text);letter-spacing:2px}
.up-role{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:3px;margin-top:4px}
.up-plan{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;margin-top:10px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700}
.up-stats{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.up-stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.up-stat .v{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--accent)}
.up-stat .l{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text2);letter-spacing:2px;margin-top:3px;text-transform:uppercase}
.info-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.info-block-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:14px;letter-spacing:2px;display:flex;align-items:center;gap:7px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(14,42,53,.5)}
.info-row:last-child{border-bottom:none}
.info-lbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px}
.info-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);font-weight:600}
.activity-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(14,42,53,.4)}
.activity-item:last-child{border-bottom:none}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text)}
.ai-time{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);margin-left:auto}
.credits-bar{margin-top:8px}
.cbar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.cbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease}

/* ── TOAST ── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{display:flex;align-items:center;gap:9px;padding:10px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.5);animation:toastIn .3s ease;min-width:220px}
.toast.ok{border-color:rgba(0,255,136,.3)}
.toast.err{border-color:rgba(255,51,85,.3)}
.toast i.oi{color:var(--green)}.toast i.ei{color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty i{font-size:40px;opacity:.15;margin-bottom:14px;display:block}
.empty p{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px}

/* ── HAMBURGER ── */
.ham-btn{
  display:none;position:fixed;top:14px;left:14px;z-index:300;
  width:40px;height:40px;border-radius:8px;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);
  color:var(--accent);font-size:16px;cursor:pointer;
  align-items:center;justify-content:center;
  transition:background .2s;
}
.ham-btn:hover{background:rgba(0,255,136,.16)}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:49;backdrop-filter:blur(3px);
}
/* ── MOBILE ≤768px ── */
@media(max-width:768px){
  .ham-btn{display:flex}
  .sidebar{
    transform:translateX(-100%);transition:transform .28s ease;
    width:260px;z-index:200;
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .topbar{padding:14px 14px 14px 64px}
  .content{padding:14px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card .sc-val{font-size:22px}
  .pdf-layout,.user-panel-grid{grid-template-columns:1fr}
  .pdf-cfg{position:static}
  .form-row{grid-template-columns:1fr}
  .modal{padding:20px 16px}
  table{font-size:10px}
  thead th{padding:8px 8px;font-size:8px}
  tbody td{padding:8px 8px}
  .btn-sm{padding:5px 8px}
  .topbar-right .pill:last-child{display:none}
  .login-box{width:95vw;padding:32px 20px}
  .login-logo .brand{font-size:18px;letter-spacing:2px}
}
/* ── TABLET 769px–1024px ── */
@media(min-width:769px) and (max-width:1024px){
  .sidebar{width:190px}
  .main{margin-left:190px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:12px}
  .pdf-layout{grid-template-columns:240px 1fr}
  .user-panel-grid{grid-template-columns:220px 1fr}
  .content{padding:18px}
  .nav-item{font-size:11px;padding:8px 9px}
}
/* ── DESKTOP ≥1025px ── */
@media(min-width:1025px){
  .stats-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<!-- MATRIX CANVAS -->
<canvas id="matrix-canvas"></canvas>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon-wrap"><i class="fa-solid fa-terminal"></i></div>
      <div class="brand">GAWR GURA</div>
      <div class="sub">SECURE ACCESS PANEL</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchLoginTab('login')">[ LOGIN ]</button>
      <button class="tab-btn" id="tab-register" onclick="switchLoginTab('register')">[ REGISTRO ]</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="fg"><label>Usuario</label><div class="iw"><i class="fa-solid fa-user"></i><input type="text" id="l-user" placeholder="usuario" autocomplete="off"/></div></div>
      <div class="fg"><label>Contraseña</label><div class="iw"><i class="fa-solid fa-lock"></i><input type="password" id="l-pass" placeholder="••••••••"/></div></div>
      <button class="btn-login" onclick="doLogin()"><span><i class="fa-solid fa-right-to-bracket"></i> ACCEDER</span></button>
      <div class="login-err" id="login-err"><i class="fa-solid fa-triangle-exclamation"></i> Credenciales incorrectas</div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none">
      <div class="fg"><label>Nombre de usuario</label><div class="iw"><i class="fa-solid fa-user-plus"></i><input type="text" id="r-user" placeholder="mi_usuario" autocomplete="off"/></div></div>
      <div class="fg"><label>Contraseña</label><div class="iw"><i class="fa-solid fa-lock"></i><input type="password" id="r-pass" placeholder="mínimo 6 caracteres"/></div></div>
      <div class="fg"><label>Confirmar Contraseña</label><div class="iw"><i class="fa-solid fa-lock"></i><input type="password" id="r-pass2" placeholder="repite la contraseña"/></div></div>
      <button class="btn-login" onclick="doRegister()"><span><i class="fa-solid fa-user-check"></i> REGISTRARSE</span></button>
      <div class="login-err" id="register-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <button class="ham-btn" id="ham-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
  <div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="brand">GAWR GURA</div>
      <div class="sub" id="sb-mode-lbl">ADMIN PANEL</div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <div class="user-badge">
        <div class="av" id="sb-av">A</div>
        <div class="ub-info">
          <div class="name" id="sb-name">Admin</div>
          <div class="role" id="sb-role">SUPERADMIN</div>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="Salir"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">DASHBOARD <span>/ INICIO</span></div>
      <div class="topbar-right">
        <div class="pill"><div class="dot-online"></div> ONLINE</div>
        <div class="pill" id="sb-plan-pill"></div>
        <div class="pill"><i class="fa-regular fa-clock" style="color:var(--text2)"></i> <span id="clock">--:--</span></div>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- EDIT USER MODAL -->
<div class="modal-ov" id="edit-modal">
  <div class="modal">
    <div class="modal-title"><i class="fa-solid fa-user-pen"></i> EDITAR USUARIO</div>
    <button class="modal-close" onclick="closeModal('edit-modal')"><i class="fa-solid fa-xmark"></i></button>
    <input type="hidden" id="edit-idx"/>
    <div class="form-row">
      <div class="fg"><label>Usuario</label><div class="iw"><i class="fa-solid fa-user"></i><input type="text" id="edit-user"/></div></div>
      <div class="fg"><label>ID Telegram</label><div class="iw"><i class="fa-brands fa-telegram"></i><input type="text" id="edit-tid"/></div></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Plan</label><div class="iw"><i class="fa-solid fa-star"></i><select id="edit-plan" style="padding-left:38px"><option value="free">Free</option><option value="vip">VIP</option><option value="creditos">Créditos</option></select></div></div>
      <div class="fg"><label>Créditos</label><div class="iw"><i class="fa-solid fa-gem"></i><input type="number" id="edit-credits" min="0"/></div></div>
    </div>
    <div class="fg"><label>VIP Hasta</label><div class="iw"><i class="fa-solid fa-calendar"></i><input type="date" id="edit-vip"/></div></div>
    <div class="fg"><label>Notas</label><div class="iw"><i class="fa-solid fa-note-sticky"></i><input type="text" id="edit-notes"/></div></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('edit-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    </div>
  </div>
</div>
